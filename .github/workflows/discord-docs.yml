name: Discord Docs Sync

on:
  push:
    branches: [master]
    paths:
      - "INSTALL.md"
      - "README.md"
      - "USER_GUIDE.md"
      - "docs/yaat-vs-atctrainer.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Sync docs to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          INSTALL_WEBHOOK: ${{ secrets.DISCORD_INSTALL_WEBHOOK_URL }}
          README_WEBHOOK: ${{ secrets.DISCORD_README_WEBHOOK_URL }}
          USERGUIDE_WEBHOOK: ${{ secrets.DISCORD_USERGUIDE_WEBHOOK_URL }}
          INSTALL_CHANNEL: "1479913221921181747"
          README_CHANNEL: "1479913261620002817"
          USERGUIDE_CHANNEL: "1479913276631683354"
          COMPARISON_WEBHOOK: ${{ secrets.DISCORD_COMPARISON_WEBHOOK_URL }}
          COMPARISON_CHANNEL: "REPLACE_WITH_CHANNEL_ID"
          REPO_URL: "https://github.com/${{ github.repository }}/blob/${{ github.sha }}"
        run: |
          set -euo pipefail

          clear_channel() {
            local channel="$1"
            python3 -c "
          import json, urllib.request, time, sys
          bot_token, channel = sys.argv[1], sys.argv[2]
          while True:
              req = urllib.request.Request(f'https://discord.com/api/v10/channels/{channel}/messages?limit=100', headers={'Authorization': f'Bot {bot_token}', 'User-Agent': 'YAAT-Discord-Docs/1.0'})
              msgs = json.loads(urllib.request.urlopen(req).read())
              if not msgs:
                  break
              for m in msgs:
                  dreq = urllib.request.Request(f'https://discord.com/api/v10/channels/{channel}/messages/{m[\"id\"]}', method='DELETE', headers={'Authorization': f'Bot {bot_token}', 'User-Agent': 'YAAT-Discord-Docs/1.0'})
                  try:
                      urllib.request.urlopen(dreq)
                  except Exception:
                      pass
                  time.sleep(0.5)
              print(f'Deleted {len(msgs)} message(s) from {channel}')
          " "$DISCORD_BOT_TOKEN" "$channel"
          }

          post_chunks() {
            local file="$1" webhook="$2"
            python3 -c "
          import json, sys, urllib.request, time, re

          with open(sys.argv[1], encoding='utf-8') as f:
              text = f.read()

          repo_url = sys.argv[3]

          # Rewrite relative markdown links to GitHub blob URLs
          def rewrite_link(m):
              label, path = m.group(1), m.group(2)
              if path.startswith('http') or path.startswith('#'):
                  # Discord doesn't render [url](url) — just emit the bare URL
                  if label.startswith('http'):
                      return path
                  return m.group(0)
              # Strip leading ../ since all docs are at repo root
              clean = path.lstrip('./')
              return f'[{label}]({repo_url}/{clean})'

          text = re.sub(r'\[([^\]]+)\]\(([^)]+)\)', rewrite_link, text)

          webhook = sys.argv[2]
          limit = 1900
          lines = text.split('\n')
          chunks, current, best_break, prev = [], '', '', ''

          for line in lines:
              candidate = current + ('\n' if current else '') + line
              # Track good break points BEFORE adding the line: blank lines, headings, or non-indented non-empty lines
              stripped = line.strip()
              is_break = stripped == '' or stripped.startswith('#') or (stripped and not line[0].isspace())
              if is_break and current:
                  best_break = current
              if len(candidate) > limit and current:
                  if best_break:
                      chunks.append(best_break)
                      remainder = current[len(best_break):].lstrip('\n')
                      current = remainder + ('\n' if remainder else '') + line if remainder else line
                  else:
                      chunks.append(current)
                      current = line
                  best_break = ''
              else:
                  current = candidate
          if current:
              chunks.append(current)

          for i, chunk in enumerate(chunks):
              payload = json.dumps({'content': chunk.strip(), 'flags': 4}).encode('utf-8')
              req = urllib.request.Request(webhook + '?wait=true', data=payload, headers={'Content-Type': 'application/json', 'User-Agent': 'YAAT-Discord-Docs/1.0'})
              urllib.request.urlopen(req)
              if i < len(chunks) - 1:
                  time.sleep(1)

          print(f'Posted {len(chunks)} message(s) for {sys.argv[1]}')
          " "$file" "$webhook" "$REPO_URL"
          }

          post_toc() {
            local file="$1" webhook="$2" title="$3" file_path="$4"
            python3 -c "
          import json, sys, urllib.request, re, time

          with open(sys.argv[1], encoding='utf-8') as f:
              lines = f.readlines()

          repo_url = sys.argv[3]
          file_path = sys.argv[4]
          title = sys.argv[5]

          toc_lines = []
          in_toc = False
          for line in lines:
              stripped = line.strip()
              if stripped == '## Table of Contents':
                  in_toc = True
                  continue
              if in_toc:
                  if stripped.startswith('##'):
                      break
                  if stripped.startswith('- ['):
                      indent = len(line) - len(line.lstrip())
                      match = re.match(r'-\s+\[(.+?)\]\((.+?)\)', stripped)
                      if match:
                          text, anchor = match.group(1), match.group(2)
                          link = f'{repo_url}/{file_path}{anchor}'
                          prefix = '  ' * (indent // 2)
                          toc_lines.append(f'{prefix}- [{text}]({link})')

          if not toc_lines:
              for line in lines:
                  stripped = line.strip()
                  match = re.match(r'^(#{2,4})\s+(.+)', stripped)
                  if match:
                      level = len(match.group(1)) - 2
                      heading = match.group(2)
                      anchor = '#' + re.sub(r'[^\w\s-]', '', heading.lower()).strip().replace(' ', '-')
                      link = f'{repo_url}/{file_path}{anchor}'
                      prefix = '  ' * level
                      toc_lines.append(f'{prefix}- [{heading}]({link})')

          full_text = f'# {title}\n\nFull document: {repo_url}/{file_path}\n\n' + '\n'.join(toc_lines)

          limit = 1900
          toc_lines_split = full_text.split('\n')
          chunks, current, best_break = [], '', ''
          for line in toc_lines_split:
              candidate = current + ('\n' if current else '') + line
              stripped = line.strip()
              is_break = stripped == '' or stripped.startswith('#') or (stripped.startswith('- ') and not line[0].isspace())
              if is_break and current:
                  best_break = current
              # Track the most recent top-level section name
              if stripped.startswith('- [') and line and not line[0].isspace():
                  m = re.match(r'-\s+\[(.+?)\]', stripped)
                  if m:
                      last_top_level = m.group(1)
              if len(candidate) > limit and current:
                  if best_break:
                      chunks.append(best_break)
                      remainder = current[len(best_break):].lstrip('\n')
                      current = remainder + ('\n' if remainder else '') + line if remainder else line
                  else:
                      chunks.append(current)
                      current = line
                  best_break = ''
              else:
                  current = candidate
          if current:
              chunks.append(current)

          # Prepend continuation header when a chunk starts mid-section
          for i in range(1, len(chunks)):
              first_line = chunks[i].lstrip('\n').split('\n')[0] if chunks[i].strip() else ''
              if first_line and first_line[0].isspace():
                  # Find the parent top-level section from previous chunks
                  parent = ''
                  for prev in reversed(chunks[:i]):
                      for pl in reversed(prev.split('\n')):
                          ps = pl.strip()
                          if ps.startswith('- [') and pl and not pl[0].isspace():
                              pm = re.match(r'-\s+\[(.+?)\]', ps)
                              if pm:
                                  parent = pm.group(1)
                              break
                      if parent:
                          break
                  if parent:
                      chunks[i] = f'- **{parent}** *(continued)*\n{chunks[i]}'

          for i, chunk in enumerate(chunks):
              payload = json.dumps({'content': chunk.strip(), 'flags': 4}).encode('utf-8')
              req = urllib.request.Request(sys.argv[2] + '?wait=true', data=payload, headers={'Content-Type': 'application/json', 'User-Agent': 'YAAT-Discord-Docs/1.0'})
              urllib.request.urlopen(req)
              if i < len(chunks) - 1:
                  time.sleep(1)

          print(f'Posted {len(chunks)} message(s) for {file_path} ToC')
          " "$file" "$webhook" "$REPO_URL" "$file_path" "$title"
          }

          sync_full() {
            local file="$1" webhook="$2" channel="$3"
            echo "Syncing $file (full content)..."
            clear_channel "$channel"
            post_chunks "$file" "$webhook"
          }

          sync_toc() {
            local file="$1" webhook="$2" channel="$3" title="$4" file_path="$5"
            echo "Syncing $file (table of contents)..."
            clear_channel "$channel"
            post_toc "$file" "$webhook" "$title" "$file_path"
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sync_full "INSTALL.md" "$INSTALL_WEBHOOK" "$INSTALL_CHANNEL"
            sync_full "README.md" "$README_WEBHOOK" "$README_CHANNEL"
            sync_toc "USER_GUIDE.md" "$USERGUIDE_WEBHOOK" "$USERGUIDE_CHANNEL" "YAAT User Guide" "USER_GUIDE.md"
            sync_toc "docs/yaat-vs-atctrainer.md" "$COMPARISON_WEBHOOK" "$COMPARISON_CHANNEL" "YAAT vs ATCTrainer" "docs/yaat-vs-atctrainer.md"
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || echo "")
            echo "$CHANGED" | grep -q "INSTALL.md" && sync_full "INSTALL.md" "$INSTALL_WEBHOOK" "$INSTALL_CHANNEL" || true
            echo "$CHANGED" | grep -q "README.md" && sync_full "README.md" "$README_WEBHOOK" "$README_CHANNEL" || true
            echo "$CHANGED" | grep -q "USER_GUIDE.md" && sync_toc "USER_GUIDE.md" "$USERGUIDE_WEBHOOK" "$USERGUIDE_CHANNEL" "YAAT User Guide" "USER_GUIDE.md" || true
            echo "$CHANGED" | grep -q "docs/yaat-vs-atctrainer.md" && sync_toc "docs/yaat-vs-atctrainer.md" "$COMPARISON_WEBHOOK" "$COMPARISON_CHANNEL" "YAAT vs ATCTrainer" "docs/yaat-vs-atctrainer.md" || true
          fi
