name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      # Fail fast if docs/command-cheatsheet.json was edited without regenerating
      # docs/command-cheatsheet.html. The HTML ships next to Yaat.Client.exe and
      # Help → Command Cheatsheet opens it in the user's browser; a stale HTML
      # would show users an out-of-date command list.
      - name: Check command cheatsheet HTML is in sync with JSON
        run: node tools/build-cheatsheet.mjs --check

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      # tools/Yaat.VStrips.Web targets net10.0-browser and needs the
      # wasm-tools workload (Emscripten + Mono WASM toolchain) for restore
      # to succeed. Without it, `dotnet restore` against the full solution
      # fails with NETSDK1147.
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /warnaserror

      # `Category=Nightly` is the trait on TaxiCoverage{Oak,Sfo}GridTests
      # (parametric every-parking sweeps, ~1200 cases). Per-PR CI runs
      # everything else; the .github/workflows/nightly-taxi-grid.yml
      # workflow runs the Nightly grid on a schedule.
      - name: Test
        run: dotnet test --no-build --configuration Release --filter "Category!=Nightly" --logger "trx;LogFileName=results.trx"

      - name: Trigger yaat-server CI
        if: github.event_name == 'push'
        run: |
          gh api repos/leftos/yaat-server/dispatches \
            -f event_type=submodule-updated \
            -f 'client_payload[sha]=${{ github.sha }}'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
