name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      # tools/Yaat.VStrips.Web targets net10.0-browser and needs the
      # wasm-tools workload (Emscripten + Mono WASM toolchain) for restore
      # to succeed. Without it, `dotnet restore` against the full solution
      # fails with NETSDK1147.
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /warnaserror

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Trigger yaat-server CI
        if: github.event_name == 'push'
        run: |
          gh api repos/leftos/yaat-server/dispatches \
            -f event_type=submodule-updated \
            -f 'client_payload[sha]=${{ github.sha }}'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
