name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /warnaserror

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Check if Yaat.Sim changed
        if: github.event_name == 'push'
        id: sim-changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^src/Yaat\.Sim/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger yaat-server CI
        if: github.event_name == 'push' && steps.sim-changed.outputs.changed == 'true'
        run: |
          gh api repos/leftos/yaat-server/dispatches \
            -f event_type=submodule-updated \
            -f 'client_payload[sha]=${{ github.sha }}'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
