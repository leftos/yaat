name: Discord Scenario Validation

on:
  schedule:
    - cron: "0 10 * * 0"  # Sundays 02:00 PT (10:00 UTC)
  workflow_dispatch:
    inputs:
      artcc:
        description: "Single ARTCC to validate (empty = all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      ZAB_CHANNEL: "1481824000479854756"
      ZAU_CHANNEL: "1481824003520860220"
      ZBW_CHANNEL: "1481824006779699251"
      ZDC_CHANNEL: "1481824009971826891"
      ZDV_CHANNEL: "1481824013893374043"
      ZFW_CHANNEL: "1481824017076982003"
      ZHU_CHANNEL: "1481824020554055751"
      ZID_CHANNEL: "1481824024144252968"
      ZJX_CHANNEL: "1481824027298500609"
      ZKC_CHANNEL: "1481824030372921458"
      ZLA_CHANNEL: "1481824033518391307"
      ZLC_CHANNEL: "1481824036907516075"
      ZMA_CHANNEL: "1481824040153911539"
      ZME_CHANNEL: "1481824043211685989"
      ZMP_CHANNEL: "1481824046776848384"
      ZNY_CHANNEL: "1481824050387882014"
      ZOA_CHANNEL: "1481824053521285253"
      ZOB_CHANNEL: "1481824056645783716"
      ZSE_CHANNEL: "1481824060508864573"
      ZTL_CHANNEL: "1481824063994462268"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Build validator
        run: dotnet build tools/Yaat.ScenarioValidator -c Release

      - name: Run validation
        run: |
          dotnet run --project tools/Yaat.ScenarioValidator --no-build -c Release -- --all --json > /tmp/validation.json 2>/tmp/validation.log || true
          cat /tmp/validation.log >&2

      - name: Post to Discord
        env:
          ARTCC_FILTER: ${{ github.event.inputs.artcc }}
        run: |
          set -euo pipefail
          python3 << 'PYEOF'
          import json, urllib.request, time, os

          bot_token = os.environ["DISCORD_BOT_TOKEN"]

          artccs = ["ZAB","ZAU","ZBW","ZDC","ZDV","ZFW","ZHU","ZID","ZJX","ZKC","ZLA","ZLC","ZMA","ZME","ZMP","ZNY","ZOA","ZOB","ZSE","ZTL"]

          with open("/tmp/validation.json") as f:
              data = json.load(f)

          def api(method, url, payload=None):
              headers = {"Authorization": f"Bot {bot_token}", "User-Agent": "YAAT-Validation/1.0"}
              if payload is not None:
                  headers["Content-Type"] = "application/json"
                  data_bytes = json.dumps(payload).encode("utf-8")
              else:
                  data_bytes = None
              req = urllib.request.Request(url, data=data_bytes, method=method, headers=headers)
              return json.loads(urllib.request.urlopen(req).read())

          def format_message(artcc):
              if artcc not in data:
                  return f"# {artcc} Scenario Validation\n\nNo scenario data available."

              results = data[artcc]
              scenarios = len(results)
              presets = sum(r.get("TotalPresets", r.get("totalPresets", 0)) for r in results)
              failures = []
              proc_issues = []
              trans_subs = []
              for r in results:
                  name = r.get("ScenarioName", r.get("scenarioName", ""))
                  for fail in r.get("Failures", r.get("failures", [])):
                      acid = fail.get("AircraftId", fail.get("aircraftId", ""))
                      cmd = fail.get("Command", fail.get("command", ""))
                      reason = fail.get("Reason", fail.get("reason", None))
                      failures.append((name, acid, cmd, reason))
                  for issue in r.get("ProcedureIssues", r.get("procedureIssues", [])):
                      acid = issue.get("AircraftId", issue.get("aircraftId", ""))
                      proc_id = issue.get("ProcedureId", issue.get("procedureId", ""))
                      kind = issue.get("Kind", issue.get("kind", 0))
                      resolved = issue.get("ResolvedId", issue.get("resolvedId", None))
                      proc_issues.append((name, acid, proc_id, kind, resolved))
                  for sub in r.get("TransitionFixSubstitutions", r.get("transitionFixSubstitutions", [])):
                      acid = sub.get("AircraftId", sub.get("aircraftId", ""))
                      proc_id = sub.get("ProcedureId", sub.get("procedureId", ""))
                      old_fix = sub.get("OldFix", sub.get("oldFix", ""))
                      new_fix = sub.get("NewFix", sub.get("newFix", None))
                      trans_subs.append((name, acid, proc_id, old_fix, new_fix))

              if not failures and not proc_issues and not trans_subs:
                  return f"# {artcc} Scenario Validation\n\n{scenarios} scenarios, {presets} presets \u2014 all commands parsed successfully."

              # Group failures by scenario → aircraft, procedure issues by scenario → procedure
              fail_by_scenario = {}
              for name, acid, cmd, reason in failures:
                  fail_by_scenario.setdefault(name, {}).setdefault(acid, [])
                  fail_by_scenario[name][acid].append((cmd, reason))
              proc_by_scenario = {}
              for name, acid, proc_id, kind, resolved in proc_issues:
                  key = (proc_id, kind, resolved)
                  proc_by_scenario.setdefault(name, {}).setdefault(key, [])
                  proc_by_scenario[name][key].append(acid)
              trans_by_scenario = {}
              for name, acid, proc_id, old_fix, new_fix in trans_subs:
                  key = (proc_id, old_fix, new_fix)
                  trans_by_scenario.setdefault(name, {}).setdefault(key, [])
                  trans_by_scenario[name][key].append(acid)

              all_scenarios = sorted(set(list(fail_by_scenario) + list(proc_by_scenario) + list(trans_by_scenario)))

              lines = [f"# {artcc} Scenario Validation\n"]
              summary_parts = [f"{scenarios} scenarios", f"{presets} presets"]
              if failures:
                  summary_parts.append(f"{len(failures)} parse failure{'s' if len(failures) != 1 else ''}")
              if proc_issues:
                  summary_parts.append(f"{len(proc_issues)} procedure issue{'s' if len(proc_issues) != 1 else ''}")
              if trans_subs:
                  summary_parts.append(f"{len(trans_subs)} transition fix sub{'s' if len(trans_subs) != 1 else ''}")
              lines.append(", ".join(summary_parts) + "\n")

              for name in all_scenarios:
                  lines.append(f"**{name}**")
                  if name in fail_by_scenario:
                      for acid, cmds in fail_by_scenario[name].items():
                          lines.append(f"  {acid}:")
                          for cmd, reason in cmds:
                              suffix = f" — {reason}" if reason else ""
                              lines.append(f"    `{cmd}`{suffix}")
                  if name in proc_by_scenario:
                      for (proc_id, kind, resolved), callsigns in sorted(proc_by_scenario[name].items()):
                          cs = ", ".join(sorted(callsigns))
                          if kind == 0 or kind == "VersionChanged":
                              lines.append(f"  `{proc_id}` → `{resolved}`: {cs}")
                          else:
                              lines.append(f"  `{proc_id}` not found: {cs}")
                  if name in trans_by_scenario:
                      for (proc_id, old_fix, new_fix), callsigns in sorted(trans_by_scenario[name].items()):
                          cs = ", ".join(sorted(callsigns))
                          replacement = f"`{new_fix}`" if new_fix else "no replacement"
                          lines.append(f"  `{proc_id}`: `{old_fix}` → {replacement}: {cs}")
                  lines.append("")

              return "\n".join(lines)

          def get_last_content(channel):
              try:
                  msgs = api("GET", f"https://discord.com/api/v10/channels/{channel}/messages?limit=5")
                  pinned = {m["id"] for m in api("GET", f"https://discord.com/api/v10/channels/{channel}/pins")}
                  for m in msgs:
                      if m["id"] not in pinned:
                          return m.get("content", "")
                  return ""
              except Exception:
                  return ""

          def clear_channel(channel):
              pinned = {m["id"] for m in api("GET", f"https://discord.com/api/v10/channels/{channel}/pins")}
              while True:
                  msgs = api("GET", f"https://discord.com/api/v10/channels/{channel}/messages?limit=100")
                  msgs = [m for m in msgs if m["id"] not in pinned]
                  if not msgs:
                      break
                  for m in msgs:
                      try:
                          req = urllib.request.Request(
                              f"https://discord.com/api/v10/channels/{channel}/messages/{m['id']}",
                              method="DELETE",
                              headers={"Authorization": f"Bot {bot_token}", "User-Agent": "YAAT-Validation/1.0"}
                          )
                          urllib.request.urlopen(req)
                      except Exception:
                          pass
                      time.sleep(0.5)
                  print(f"  Deleted {len(msgs)} message(s)")

          def post_chunks(channel, text):
              limit = 1900
              lines = text.split("\n")
              chunks, current, best_break = [], "", ""

              for line in lines:
                  candidate = current + ("\n" if current else "") + line
                  stripped = line.strip()
                  is_break = stripped == "" or stripped.startswith("#") or stripped.startswith("**")
                  if is_break and current:
                      best_break = current
                  if len(candidate) > limit and current:
                      if best_break:
                          chunks.append(best_break)
                          remainder = current[len(best_break):].lstrip("\n")
                          current = remainder + ("\n" if remainder else "") + line if remainder else line
                      else:
                          chunks.append(current)
                          current = line
                      best_break = ""
                  else:
                      current = candidate
              if current:
                  chunks.append(current)

              url = f"https://discord.com/api/v10/channels/{channel}/messages"
              for i, chunk in enumerate(chunks):
                  api("POST", url, {"content": chunk.strip(), "flags": 4})
                  if i < len(chunks) - 1:
                      time.sleep(1)
              print(f"  Posted {len(chunks)} message(s)")

          artcc_filter = os.environ.get("ARTCC_FILTER", "").strip().upper()

          for artcc in artccs:
              if artcc_filter and artcc != artcc_filter:
                  continue
              channel = os.environ.get(f"{artcc}_CHANNEL", "")
              if not channel:
                  print(f"{artcc}: no channel ID configured, skipping")
                  continue

              message = format_message(artcc)
              last_content = get_last_content(channel)

              if message[:1900] == last_content[:1900] and last_content:
                  print(f"{artcc}: unchanged, skipping")
                  continue

              print(f"{artcc}: updating channel...")
              clear_channel(channel)
              post_chunks(channel, message)

          print("Done.")
          PYEOF
