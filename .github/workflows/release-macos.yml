name: Release (macOS)

# Split out from release.yml so the win+linux installers publish immediately on
# a tag push instead of waiting on Apple notarization (which can take 15-30 min).
# Both workflows fire on the same v* tag. release.yml CREATES the GitHub Release;
# this one appends the macOS assets to it once notarization finishes.
#
# Apple Silicon and Intel ship as two separate packages, each on its own Velopack
# channel (osx-arm64 / osx-x64). Velopack resolves updates by channel, so a shared
# channel would eventually offer an Intel package to an Apple Silicon client.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  # Keep in sync with the Velopack PackageReference in the client csproj files;
  # the vpk CLI and the Velopack runtime library must be the same version.
  VPK_VERSION: "0.0.1298"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: ver
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [osx-arm64, osx-x64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        env:
          # Injected into Yaat.Client.dll as an AssemblyMetadata attribute via
          # -p:LmKitLicenseKey=... below. LmKitLicense.Initialize() picks it up at startup via
          # reflection so installed builds don't need a .env file or ambient env var. Empty when
          # the secret is not configured on the repo, in which case the installer falls back to
          # Community Edition exactly like a fresh dev clone.
          LMKIT_LICENSE_KEY: ${{ secrets.LMKIT_LICENSE_KEY }}
        run: |
          dotnet publish src/Yaat.Client \
            -c Release -r ${{ matrix.rid }} --self-contained \
            -p:PublishSingleFile=true \
            -p:InformationalVersion=${{ needs.version.outputs.version }}+${{ needs.version.outputs.short_sha }} \
            -p:LmKitLicenseKey="$LMKIT_LICENSE_KEY" \
            -o publish/${{ matrix.rid }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-client-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

  # Proves the x64 build actually runs on an Intel CPU before its package is
  # published. Header inspection (below) catches a wrong-architecture publish;
  # only executing LM-Kit's native backend catches a library that ships an
  # x86_64 slice but was never exercised on one. macos-15-intel is the last
  # x86_64 image GitHub offers — it is available until August 2027.
  smoke-intel:
    needs: build
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-client-osx-x64
          path: publish/osx-x64

      - name: Verify every shipped native carries an x86_64 slice
        run: |
          set -euo pipefail
          # LM-Kit publishes its macOS natives from a RID-agnostic runtimes/osx/ folder, so its
          # two arm64-only dylibs land in the x64 output as well. Neither is loaded on Intel: the
          # Metal backend is skipped in favour of the CPU (SSE4/AVX2) backend, and LM-Kit's ONNX
          # runtime only serves ONNX models, while YAAT loads GGUF exclusively. Anything else
          # missing an x86_64 slice would abort the app at its first dlopen, so fail the release.
          expected_arm64_only="LM-Kit.ggml.backend.metal.dylib LM-Kit.onnxruntime.dylib"

          file publish/osx-x64/Yaat.Client
          file publish/osx-x64/Yaat.Client | grep -q 'executable x86_64'

          failed=0
          for lib in publish/osx-x64/*.dylib; do
            name=$(basename "$lib")
            slices=$(lipo -archs "$lib")
            printf '  %-34s %s\n' "$name" "$slices"
            case " $expected_arm64_only " in
              *" $name "*) continue ;;
            esac
            if [[ " $slices " != *" x86_64 "* ]]; then
              echo "::error::$name has no x86_64 slice ($slices) — it would fail to load on Intel"
              failed=1
            fi
          done
          exit "$failed"

      - name: Enumerate LM-Kit devices
        continue-on-error: true  # diagnostic only; an Intel Mac legitimately reports no GPU
        run: dotnet run --project tools/Yaat.SpeechSandbox -c Release -- --lmkit-gpus

      - name: Transcribe through LM-Kit on the Intel CPU backend
        env:
          LMKIT_LICENSE_KEY: ${{ secrets.LMKIT_LICENSE_KEY }}
        run: |
          set -uo pipefail
          mkdir -p .tmp
          log=.tmp/lmkit-intel-smoke.log
          dotnet run --project tools/Yaat.SpeechSandbox -c Release -- \
            --lmkit-stt tests/Yaat.Client.Tests/TestData/audio/probe-1.wav whisper-base 2>&1 | tee "$log"

          # The probe reports load and transcribe failures on stdout rather than exiting
          # non-zero, so gate on its output. A crash in the native backend loses the exit
          # code to the pipe but also produces no transcript, which the second check catches.
          if grep -qE 'FAILED to load|TRANSCRIBE FAILED' "$log"; then
            echo "::error::LM-Kit failed to load or transcribe on Intel macOS"
            exit 1
          fi
          if ! grep -q 'Warm transcribe:' "$log"; then
            echo "::error::LM-Kit produced no transcription on Intel macOS"
            exit 1
          fi

  package-macos:
    needs: [version, build]
    runs-on: macos-latest
    strategy:
      matrix:
        rid: [osx-arm64, osx-x64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-client-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version "$VPK_VERSION"

      - name: Generate .icns from icon.png
        run: |
          # Velopack's macOS packer requires .icns, so build one from the PNG
          # using Apple's built-in sips + iconutil. Only the multiple-of-two
          # sizes commonly recognized by iconutil are emitted.
          src=src/Yaat.Client/Resources/icon.png
          iconset=$RUNNER_TEMP/icon.iconset
          mkdir -p "$iconset"
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" "$src" --out "$iconset/icon_${size}x${size}.png" >/dev/null
            double=$((size * 2))
            sips -z "$double" "$double" "$src" --out "$iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$iconset" -o "$RUNNER_TEMP/icon.icns"
          echo "ICNS_PATH=$RUNNER_TEMP/icon.icns" >> "$GITHUB_ENV"

      - name: Generate Info.plist
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # vpk copies --plist verbatim, so substitute the version placeholders
          # here. CFBundleShortVersionString must be numeric (Apple rejects a
          # prerelease suffix there), so strip it: 0.6.0-beta -> 0.6.0.
          # CFBundleVersion keeps the full version, matching Velopack's default.
          short="${VERSION%%-*}"
          sed -e "s/__SHORT_VERSION__/$short/g" -e "s/__BUNDLE_VERSION__/$VERSION/g" \
            build/macos/Info.plist.template > "$RUNNER_TEMP/Info.plist"
          echo "PLIST_PATH=$RUNNER_TEMP/Info.plist" >> "$GITHUB_ENV"
          cat "$RUNNER_TEMP/Info.plist"

      - name: Import signing certificates and notary profile
        id: signing
        env:
          DEVID_APP_CERT_BASE64: ${{ secrets.MACOS_DEVID_APP_CERT_P12_BASE64 }}
          DEVID_INSTALLER_CERT_BASE64: ${{ secrets.MACOS_DEVID_INSTALLER_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_DEVID_CERT_PASSWORD }}
          NOTARY_API_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_P8_BASE64 }}
          NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.MACOS_NOTARY_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Signing is optional: a fork (or this repo before the secrets are
          # configured) still produces a working — if unsigned — package, the
          # same way the LMKIT_LICENSE_KEY secret degrades to Community Edition.
          if [ -z "$DEVID_APP_CERT_BASE64" ]; then
            echo "::warning::macOS signing secrets not configured — building an UNSIGNED, un-notarized package. macOS Gatekeeper will warn users on first launch. See docs/macos-code-signing.md to enable signing."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          keychain="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_pw="$(openssl rand -base64 24)"
          app_cert="$RUNNER_TEMP/devid_app.p12"
          installer_cert="$RUNNER_TEMP/devid_installer.p12"
          notary_key="$RUNNER_TEMP/notary_key.p8"

          echo -n "$DEVID_APP_CERT_BASE64" | base64 --decode -o "$app_cert"
          echo -n "$DEVID_INSTALLER_CERT_BASE64" | base64 --decode -o "$installer_cert"
          echo -n "$NOTARY_API_KEY_BASE64" | base64 --decode -o "$notary_key"

          security create-keychain -p "$keychain_pw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pw" "$keychain"

          security import "$app_cert" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security import "$installer_cert" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"

          # Without an explicit partition list, codesign/productbuild trigger a
          # GUI password prompt that hangs the headless runner even though -A was
          # passed at import time.
          security set-key-partition-list -S apple-tool:,apple: -k "$keychain_pw" "$keychain" >/dev/null

          # Put our keychain on the search list so vpk's codesign/notarytool find it.
          security list-keychain -d user -s "$keychain"

          # Store the App Store Connect API key as a notarytool profile inside the
          # same keychain vpk is told to use via --keychain.
          xcrun notarytool store-credentials "velopack-profile" \
            --key "$notary_key" \
            --key-id "$NOTARY_API_KEY_ID" \
            --issuer "$NOTARY_API_ISSUER_ID" \
            --keychain "$keychain"

          rm -f "$app_cert" "$installer_cert" "$notary_key"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "KEYCHAIN_PATH=$keychain" >> "$GITHUB_ENV"

      - name: Pack macOS bundle
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          SIGN_APP_IDENTITY: ${{ secrets.MACOS_SIGN_APP_IDENTITY }}
          SIGN_INSTALL_IDENTITY: ${{ secrets.MACOS_SIGN_INSTALL_IDENTITY }}
          VERSION: ${{ needs.version.outputs.version }}
          RID: ${{ matrix.rid }}
        run: |
          set -euo pipefail
          # This runner is arm64 and packs the x64 payload too. That is fine: on macOS the
          # runtime RID is only recorded as .pkg metadata, and codesign / notarytool do not
          # care what architecture the binaries they sign target.
          args=(
            --packId YaatClient
            --packVersion "$VERSION"
            --packDir "publish/$RID"
            --mainExe Yaat.Client
            --packTitle "YAAT Client"
            --icon "$ICNS_PATH"
            # One Velopack channel per architecture — a shared channel would let the updater
            # hand an Apple Silicon package to an Intel client. --runtime writes the arch into
            # the .pkg so the macOS installer refuses the wrong one outright (without it,
            # Rosetta would silently run the Intel build on Apple Silicon).
            --channel "$RID"
            --runtime "$RID"
            # No --bundleId: vpk rejects it alongside --plist ("choose one").
            # CFBundleIdentifier lives in the plist (dev.leftos.yaat).
            --plist "$PLIST_PATH"
            --outputDir releases
          )
          if [ "$SIGNING_ENABLED" = "true" ]; then
            args+=(
              --signAppIdentity "$SIGN_APP_IDENTITY"
              --signInstallIdentity "$SIGN_INSTALL_IDENTITY"
              --signEntitlements "$GITHUB_WORKSPACE/build/macos/Yaat.Client.entitlements"
              --notaryProfile velopack-profile
              --keychain "$KEYCHAIN_PATH"
            )
          fi
          vpk pack "${args[@]}"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-installer-macos-${{ matrix.rid }}
          path: releases/

      - name: Clean up signing keychain
        if: ${{ always() && steps.signing.outputs.enabled == 'true' }}
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db"

  release-macos:
    needs: [version, package-macos, smoke-intel]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release upload appends assets to the existing release
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          # Both architectures embed their channel in every filename they emit,
          # so the two artifacts merge into one directory without collisions.
          pattern: yaat-installer-macos-*
          merge-multiple: true
          path: artifacts/macos

      - name: Prepare macOS release assets
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release

          # Every copy below addresses vpk's output by exact name, so log what it
          # actually produced — that makes a naming change obvious at a glance.
          echo "=== vpk output (both architectures) ==="
          ls -la artifacts/macos

          # ---- Velopack auto-update metadata (keep filenames intact) ----
          # The auto-updater fetches RELEASES*, *.json, and *-full.nupkg by exact
          # filename. macOS emits one set per channel (RELEASES-osx-arm64,
          # releases.osx-arm64.json, assets.osx-arm64.json, *-osx-arm64-full.nupkg,
          # and the osx-x64 equivalents) — all distinct from the win/linux assets
          # release.yml uploads, so appending never clobbers them.
          find artifacts/macos \( -name 'RELEASES*' -o -name '*.json' -o -name '*-full.nupkg' \) \
            -exec cp -f {} release/ \;

          # releases.{channel}.json is the index UpdateManager fetches. If vpk stopped
          # emitting one, auto-update would break silently on the next launch, so fail here.
          for channel in osx-arm64 osx-x64; do
            [ -f "release/releases.${channel}.json" ] || {
              echo "::error::releases.${channel}.json was not produced by vpk pack"
              exit 1
            }
          done

          # ---- One-time channel supersede (osx -> osx-arm64) ----
          # Clients installed before the architecture split were packed on Velopack's
          # default "osx" channel and look up releases.osx.json by exact name. Publishing
          # copies of the arm64 index under the old names lets them find this release; once
          # they apply it they carry the osx-arm64 channel and follow it from then on.
          # Intel never had an "osx" install, so it needs no equivalent. These three copies
          # can be dropped once the arm64 install base has moved off the old channel.
          cp -f release/releases.osx-arm64.json release/releases.osx.json
          for legacy in "assets.osx-arm64.json:assets.osx.json" "RELEASES-osx-arm64:RELEASES-osx"; do
            src="release/${legacy%%:*}"
            dst="release/${legacy##*:}"
            if [ -f "$src" ]; then
              cp -f "$src" "$dst"
            else
              echo "::warning::$src not produced by vpk pack; skipping its compatibility copy"
            fi
          done

          # ---- Installer + portable (versioned filenames) ----
          for rid in osx-arm64 osx-x64; do
            cp "artifacts/macos/YaatClient-${rid}-Setup.pkg"    "release/YaatClient-${VERSION}-${rid}-Setup.pkg"
            cp "artifacts/macos/YaatClient-${rid}-Portable.zip" "release/YaatClient-${VERSION}-${rid}-Portable.zip"
          done

          echo "=== macOS release/ contents ==="
          find release -maxdepth 1 -type f -printf '%-50f %12s bytes\n' | sort

      - name: Upload macOS assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # release.yml (win+linux) creates the GitHub Release. macOS is far slower
          # (notarization), so the release should already exist — but guard the
          # ordering: wait up to ~10 min for it, then append assets without
          # touching the body or the win/linux files. --clobber makes re-runs idempotent.
          for attempt in $(seq 1 30); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              break
            fi
            echo "Release $TAG not present yet (attempt $attempt/30); waiting 20s…"
            sleep 20
          done
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "::error::Release $TAG was not created by the win+linux Release workflow within the wait window."
            exit 1
          fi
          gh release upload "$TAG" release/* --repo "$REPO" --clobber
