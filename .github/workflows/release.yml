name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write  # for the final step that dispatches discord-release.yml

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: ver
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

  changelog:
    needs: version
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cl.outputs.changelog }}
      highlights: ${{ steps.cl.outputs.highlights }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Extract changelog section
        id: cl
        run: |
          # Extract the section of CHANGELOG.md matching the just-pushed tag.
          # Headings look like "## 0.1.1-alpha" or "## 0.1.1-alpha - 2026-04-24".
          # The tag is "v0.1.1-alpha"; strip the leading "v" before matching.
          CURRENT_TAG="${GITHUB_REF_NAME}"
          VERSION="${CURRENT_TAG#v}"

          if [[ ! -f CHANGELOG.md ]]; then
            echo "::error::CHANGELOG.md not found at repo root"
            exit 1
          fi

          # Print everything from the first "## " heading containing $VERSION
          # up to (but not including) the next "## " heading. Handles optional
          # date suffix and either "v"-prefixed or bare version headings.
          full_section=$(awk -v ver="$VERSION" '
            /^## / {
              if (in_section) exit
              line = substr($0, 4)
              gsub(/^[ \t]+|[ \t]+$/, "", line)
              # match the version as a whole token (avoid 0.1 matching 0.10)
              if (match(line, "(^|[^0-9.])"ver"([^0-9.]|$)")) {
                in_section = 1
                next
              }
            }
            in_section { print }
          ' CHANGELOG.md)

          if [[ -z "$full_section" ]]; then
            echo "::error::No CHANGELOG.md section found for version '$VERSION'."
            echo "::error::Run the prepare-release skill — it promotes the unreleased section heading to the tagged version."
            exit 1
          fi

          # Split out the "### Highlights" subsection (written by the prepare-release
          # skill) into its own block, and emit the remainder as the changelog body.
          # The release-body builder renders highlights and changelog separately.
          highlights=$(printf '%s\n' "$full_section" | awk '
            /^### / {
              if (in_block) { in_block = 0 }
              if ($0 == "### Highlights") { in_block = 1; next }
            }
            in_block { print }
          ')
          changelog=$(printf '%s\n' "$full_section" | awk '
            /^### / {
              if (in_block) { in_block = 0 }
              if ($0 == "### Highlights") { in_block = 1; next }
            }
            !in_block
          ')

          # Trim leading and trailing blank lines on both blocks.
          trim() { awk 'NF{p=1} p' | sed -e :a -e '/^[[:space:]]*$/{$d;N;ba' -e '}'; }
          highlights=$(printf '%s\n' "$highlights" | trim)
          changelog=$(printf '%s\n' "$changelog" | trim)

          {
            echo "changelog<<CHANGELOG_EOF"
            printf '%s\n' "$changelog"
            echo "CHANGELOG_EOF"
            echo "highlights<<HIGHLIGHTS_EOF"
            printf '%s\n' "$highlights"
            echo "HIGHLIGHTS_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        env:
          # Injected into Yaat.Client.dll as an AssemblyMetadata attribute via
          # -p:LmKitLicenseKey=... below. LmKitLicense.Initialize() picks it up at startup via
          # reflection so installed builds don't need a .env file or ambient env var. Empty when
          # the secret is not configured on the repo, in which case the installer falls back to
          # Community Edition exactly like a fresh dev clone.
          LMKIT_LICENSE_KEY: ${{ secrets.LMKIT_LICENSE_KEY }}
        run: |
          dotnet publish src/Yaat.Client \
            -c Release -r ${{ matrix.rid }} --self-contained \
            -p:PublishSingleFile=true \
            -p:InformationalVersion=${{ needs.version.outputs.version }}+${{ needs.version.outputs.short_sha }} \
            -p:LmKitLicenseKey="$LMKIT_LICENSE_KEY" \
            -o publish/${{ matrix.rid }}

          # Standalone vStrips app — references Yaat.Client.Core only (no LM-Kit).
          dotnet publish tools/Yaat.VStrips \
            -c Release -r ${{ matrix.rid }} --self-contained \
            -p:PublishSingleFile=true \
            -p:InformationalVersion=${{ needs.version.outputs.version }}+${{ needs.version.outputs.short_sha }} \
            -o publish-vstrips/${{ matrix.rid }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-client-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-vstrips-${{ matrix.rid }}
          path: publish-vstrips/${{ matrix.rid }}

  package-win:
    needs: [version, build]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-client-win-x64
          path: publish/win-x64

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-vstrips-win-x64
          path: publish-vstrips/win-x64

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack installer
        run: |
          vpk pack `
            --packId YaatClient `
            --packVersion ${{ needs.version.outputs.version }} `
            --packDir publish/win-x64 `
            --mainExe Yaat.Client.exe `
            --packTitle "YAAT Client" `
            --icon src/Yaat.Client/Resources/icon.ico `
            --outputDir releases

          vpk pack `
            --packId YaatVStrips `
            --packVersion ${{ needs.version.outputs.version }} `
            --packDir publish-vstrips/win-x64 `
            --mainExe Yaat.VStrips.exe `
            --packTitle "YAAT Flight Strips" `
            --icon src/Yaat.Client/Resources/icon.ico `
            --channel vstrips-win `
            --outputDir releases-vstrips

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-installer-win
          path: releases/

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-vstrips-installer-win
          path: releases-vstrips/

  package-linux:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-client-linux-x64
          path: publish/linux-x64

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-vstrips-linux-x64
          path: publish-vstrips/linux-x64

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack AppImage
        run: |
          vpk pack \
            --packId YaatClient \
            --packVersion ${{ needs.version.outputs.version }} \
            --packDir publish/linux-x64 \
            --mainExe Yaat.Client \
            --packTitle "YAAT Client" \
            --icon src/Yaat.Client/Resources/icon.png \
            --outputDir releases

          vpk pack \
            --packId YaatVStrips \
            --packVersion ${{ needs.version.outputs.version }} \
            --packDir publish-vstrips/linux-x64 \
            --mainExe Yaat.VStrips \
            --packTitle "YAAT Flight Strips" \
            --icon src/Yaat.Client/Resources/icon.png \
            --channel vstrips-linux \
            --outputDir releases-vstrips

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-installer-linux
          path: releases/

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-vstrips-installer-linux
          path: releases-vstrips/

  package-macos:
    needs: [version, build]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-client-osx-arm64
          path: publish/osx-arm64

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: yaat-vstrips-osx-arm64
          path: publish-vstrips/osx-arm64

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Generate .icns from icon.png
        run: |
          # Velopack's macOS packer requires .icns, so build one from the PNG
          # using Apple's built-in sips + iconutil. Only the multiple-of-two
          # sizes commonly recognized by iconutil are emitted.
          src=src/Yaat.Client/Resources/icon.png
          iconset=$RUNNER_TEMP/icon.iconset
          mkdir -p "$iconset"
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" "$src" --out "$iconset/icon_${size}x${size}.png" >/dev/null
            double=$((size * 2))
            sips -z "$double" "$double" "$src" --out "$iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$iconset" -o "$RUNNER_TEMP/icon.icns"
          echo "ICNS_PATH=$RUNNER_TEMP/icon.icns" >> "$GITHUB_ENV"

      - name: Pack macOS bundle
        run: |
          vpk pack \
            --packId YaatClient \
            --packVersion ${{ needs.version.outputs.version }} \
            --packDir publish/osx-arm64 \
            --mainExe Yaat.Client \
            --packTitle "YAAT Client" \
            --icon "$ICNS_PATH" \
            --outputDir releases

          vpk pack \
            --packId YaatVStrips \
            --packVersion ${{ needs.version.outputs.version }} \
            --packDir publish-vstrips/osx-arm64 \
            --mainExe Yaat.VStrips \
            --packTitle "YAAT Flight Strips" \
            --icon "$ICNS_PATH" \
            --channel vstrips-osx \
            --outputDir releases-vstrips

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-installer-macos
          path: releases/

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: yaat-vstrips-installer-macos
          path: releases-vstrips/

  release:
    needs: [version, changelog, build, package-win, package-linux, package-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          path: artifacts

      - name: Prepare release assets
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release

          # ---- Velopack auto-update metadata (keep filenames intact) ----
          # The auto-updater fetches RELEASES*, *.json, and *-full.nupkg by
          # exact filename. Renaming would break updates from older clients.
          for src in artifacts/yaat-installer-win artifacts/yaat-installer-linux artifacts/yaat-installer-macos \
                     artifacts/yaat-vstrips-installer-win artifacts/yaat-vstrips-installer-linux artifacts/yaat-vstrips-installer-macos; do
            [ -d "$src" ] || continue
            find "$src" \( -name 'RELEASES*' -o -name '*.json' -o -name '*-full.nupkg' \) \
              -exec cp -f {} release/ \;
          done

          # ---- Velopack installers (versioned filenames) ----
          # Pattern: {App}-{Version}-{Platform}-Setup.{ext} for installers,
          # {App}-{Version}-{Platform}.AppImage where AppImage is its own form.
          cp artifacts/yaat-installer-win/YaatClient-win-Setup.exe   "release/YaatClient-${VERSION}-win-Setup.exe"
          cp artifacts/yaat-installer-macos/YaatClient-osx-Setup.pkg "release/YaatClient-${VERSION}-osx-Setup.pkg"
          cp artifacts/yaat-installer-linux/YaatClient.AppImage      "release/YaatClient-${VERSION}-linux.AppImage"

          # Note: vpk pack --channel embeds the channel into installer filenames
          # (YaatVStrips-vstrips-win-Setup.exe, etc), so the source paths include
          # the channel suffix — only the destination keeps the user-facing
          # {App}-{Version}-{Platform} convention.
          cp artifacts/yaat-vstrips-installer-win/YaatVStrips-vstrips-win-Setup.exe     "release/YaatVStrips-${VERSION}-win-Setup.exe"
          cp artifacts/yaat-vstrips-installer-macos/YaatVStrips-vstrips-osx-Setup.pkg   "release/YaatVStrips-${VERSION}-osx-Setup.pkg"
          cp artifacts/yaat-vstrips-installer-linux/YaatVStrips-vstrips-linux.AppImage  "release/YaatVStrips-${VERSION}-linux.AppImage"

          # ---- Portable archives (Velopack-produced) ----
          # vpk pack writes a *-Portable.zip alongside the installer, containing
          # the full publish folder (single-file exe + sibling native DLLs like
          # libSkiaSharp, HarfBuzz, LM-Kit). User unzips and runs.
          # On Linux there is no separate portable zip — the AppImage already
          # bundles everything and runs without install, so it serves both roles.
          cp artifacts/yaat-installer-win/YaatClient-win-Portable.zip   "release/YaatClient-${VERSION}-win-Portable.zip"
          cp artifacts/yaat-installer-macos/YaatClient-osx-Portable.zip "release/YaatClient-${VERSION}-osx-Portable.zip"

          cp artifacts/yaat-vstrips-installer-win/YaatVStrips-vstrips-win-Portable.zip     "release/YaatVStrips-${VERSION}-win-Portable.zip"
          cp artifacts/yaat-vstrips-installer-macos/YaatVStrips-vstrips-osx-Portable.zip   "release/YaatVStrips-${VERSION}-osx-Portable.zip"

          echo "=== release/ contents ==="
          find release -maxdepth 1 -type f -printf '%-50f %12s bytes\n' | sort

      - name: Build release body
        id: body
        env:
          # Values arrive through the environment so bash never re-parses
          # literal backticks (or other shell metacharacters) in the highlight
          # and changelog text as command substitutions. Inlining via ${{ }}
          # directly into the script source treats the text as code.
          HIGHLIGHTS: ${{ needs.changelog.outputs.highlights }}
          CHANGELOG: ${{ needs.changelog.outputs.changelog }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          body_file=$(mktemp)

          {
            if [[ -n "$HIGHLIGHTS" ]]; then
              echo "## Highlights"
              echo ""
              printf '%s\n' "$HIGHLIGHTS"
              echo ""
            fi

            echo "## Changelog"
            echo ""
            printf '%s\n' "$CHANGELOG"
            echo ""

            echo "---"
            echo ""
            echo "### YAAT Client"
            echo "| Platform | Installer (recommended) | Portable |"
            echo "|----------|------------------------|----------|"
            echo "| Windows | \`YaatClient-${VERSION}-win-Setup.exe\` | \`YaatClient-${VERSION}-win-Portable.zip\` |"
            echo "| Linux   | \`YaatClient-${VERSION}-linux.AppImage\` | (the AppImage is itself portable) |"
            echo "| macOS   | \`YaatClient-${VERSION}-osx-Setup.pkg\` | \`YaatClient-${VERSION}-osx-Portable.zip\` |"
            echo ""
            echo "### YAAT Flight Strips (standalone)"
            echo "Drop-in replacement for vStrips — run alongside CRC to see, modify, create, and move flight strips while YAAT awaits vNAS approval."
            echo "| Platform | Installer (recommended) | Portable |"
            echo "|----------|------------------------|----------|"
            echo "| Windows | \`YaatVStrips-${VERSION}-win-Setup.exe\` | \`YaatVStrips-${VERSION}-win-Portable.zip\` |"
            echo "| Linux   | \`YaatVStrips-${VERSION}-linux.AppImage\` | (the AppImage is itself portable) |"
            echo "| macOS   | \`YaatVStrips-${VERSION}-osx-Setup.pkg\` | \`YaatVStrips-${VERSION}-osx-Portable.zip\` |"
            echo ""
            echo "Installers include auto-update support. Portable archives unzip to a folder you can run from anywhere — no install, no auto-update. The Linux AppImage is itself portable."
          } > "$body_file"

          {
            echo "body<<BODY_EOF"
            cat "$body_file"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body: ${{ steps.body.outputs.body }}
          files: release/*

      # Manually dispatch discord-release.yml. GitHub's recursion guard prevents
      # the release: published event from auto-triggering workflows when the
      # release was created by the default GITHUB_TOKEN, but workflow_dispatch
      # is exempt from that guard, so this works with GITHUB_TOKEN's actions:write.
      - name: Announce release on Discord
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # --repo is required because the release job never checks out the
          # source tree, so gh has no .git/ to infer the repo from.
          gh workflow run discord-release.yml --repo "$REPO" --ref main -f tag="v${TAG}"
