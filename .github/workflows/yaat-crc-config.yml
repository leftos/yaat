name: yaat-crc-config release

on:
  push:
    tags:
      - "crc-config-v*"

permissions: {}

jobs:
  build:
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: yaat-crc-config.exe
            asset_name: yaat-crc-config-windows-x86_64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: yaat-crc-config
            asset_name: yaat-crc-config-linux-x86_64
          - os: macos-latest
            target: universal2-apple-darwin
            artifact_name: yaat-crc-config
            asset_name: yaat-crc-config-macos-universal.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Build (non-macOS)
        if: matrix.os != 'macos-latest'
        working-directory: tools/yaat-crc-config
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (macOS universal2)
        if: matrix.os == 'macos-latest'
        working-directory: tools/yaat-crc-config
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/universal2-apple-darwin/release
          lipo -create -output target/universal2-apple-darwin/release/yaat-crc-config \
            target/aarch64-apple-darwin/release/yaat-crc-config \
            target/x86_64-apple-darwin/release/yaat-crc-config

      - name: Stage asset (non-macOS)
        if: matrix.os != 'macos-latest'
        shell: bash
        working-directory: tools/yaat-crc-config
        run: |
          mkdir -p ../../dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "../../dist/${{ matrix.asset_name }}"

      - name: Import signing certificate and notary profile (macOS)
        id: signing
        if: matrix.os == 'macos-latest'
        env:
          # Reuses the client's Developer ID Application certificate + notary key
          # (see docs/macos-code-signing.md). The Installer cert is not needed —
          # a .dmg is signed with the Application identity, not the Installer one.
          DEVID_APP_CERT_BASE64: ${{ secrets.MACOS_DEVID_APP_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_DEVID_CERT_PASSWORD }}
          NOTARY_API_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_P8_BASE64 }}
          NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.MACOS_NOTARY_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Signing is optional: a fork (or this repo before the secrets are
          # configured) still produces a working — if unsigned — .dmg, the same
          # way the client's package-macos job degrades when secrets are absent.
          if [ -z "$DEVID_APP_CERT_BASE64" ]; then
            echo "::warning::macOS signing secrets not configured — building an UNSIGNED, un-notarized .dmg. macOS Gatekeeper will warn users on first launch. See docs/macos-code-signing.md to enable signing."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          keychain="$RUNNER_TEMP/crc-config-signing.keychain-db"
          keychain_pw="$(openssl rand -base64 24)"
          app_cert="$RUNNER_TEMP/devid_app.p12"
          notary_key="$RUNNER_TEMP/notary_key.p8"

          echo -n "$DEVID_APP_CERT_BASE64" | base64 --decode -o "$app_cert"
          echo -n "$NOTARY_API_KEY_BASE64" | base64 --decode -o "$notary_key"

          security create-keychain -p "$keychain_pw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pw" "$keychain"

          security import "$app_cert" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"

          # Without an explicit partition list, codesign triggers a GUI password
          # prompt that hangs the headless runner even though -A was passed.
          security set-key-partition-list -S apple-tool:,apple: -k "$keychain_pw" "$keychain" >/dev/null

          # Put our keychain on the search list so codesign/notarytool find it.
          security list-keychain -d user -s "$keychain"

          # Store the App Store Connect API key as a notarytool profile inside the
          # same keychain notarytool is told to use via --keychain.
          xcrun notarytool store-credentials "notary-profile" \
            --key "$notary_key" \
            --key-id "$NOTARY_API_KEY_ID" \
            --issuer "$NOTARY_API_ISSUER_ID" \
            --keychain "$keychain"

          rm -f "$app_cert" "$notary_key"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "KEYCHAIN_PATH=$keychain" >> "$GITHUB_ENV"

      - name: Package macOS .app + .dmg (sign, notarize, staple)
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: tools/yaat-crc-config
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          SIGN_APP_IDENTITY: ${{ secrets.MACOS_SIGN_APP_IDENTITY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#crc-config-v}"
          bin="target/universal2-apple-darwin/release/yaat-crc-config"
          staging="$RUNNER_TEMP/dmg-staging"
          app="$staging/yaat-crc-config.app"
          dmg="$RUNNER_TEMP/yaat-crc-config-macos-universal.dmg"

          # ---- Wrap the CLI binary in a minimal .app bundle ----
          # The tool is dialog-driven (osascript on macOS) and meant to be
          # double-clicked. A bare Mach-O cannot carry a stapled notarization
          # ticket, so Gatekeeper re-verifies it on every launch and blocks it
          # on recent macOS; an .app bundle can be stapled, so it opens offline.
          rm -rf "$staging"
          mkdir -p "$app/Contents/MacOS"
          cp "$bin" "$app/Contents/MacOS/yaat-crc-config"
          chmod +x "$app/Contents/MacOS/yaat-crc-config"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>CFBundleName</key><string>yaat-crc-config</string>'
            echo '  <key>CFBundleDisplayName</key><string>YAAT CRC Config</string>'
            echo '  <key>CFBundleIdentifier</key><string>dev.leftos.yaat-crc-config</string>'
            echo '  <key>CFBundleExecutable</key><string>yaat-crc-config</string>'
            echo '  <key>CFBundlePackageType</key><string>APPL</string>'
            echo '  <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>'
            echo "  <key>CFBundleVersion</key><string>$version</string>"
            echo "  <key>CFBundleShortVersionString</key><string>$version</string>"
            echo '  <key>LSMinimumSystemVersion</key><string>10.13</string>'
            echo '</dict>'
            echo '</plist>'
          } > "$app/Contents/Info.plist"

          # Conventional drag-to-install target alongside the app.
          ln -s /Applications "$staging/Applications"

          if [ "$SIGNING_ENABLED" != "true" ]; then
            # UDZO = compressed read-only image; the volume mounts as "yaat-crc-config".
            hdiutil create -volname "yaat-crc-config" -srcfolder "$staging" \
              -ov -format UDZO "$dmg"
            mkdir -p ../../dist
            cp "$dmg" "../../dist/${{ matrix.asset_name }}"
            exit 0
          fi

          # ---- Sign, notarize, and staple the .app (hardened runtime) ----
          # Staple the bundle itself so it launches offline regardless of the
          # surrounding .dmg.
          codesign --force --timestamp --options runtime \
            --sign "$SIGN_APP_IDENTITY" --keychain "$KEYCHAIN_PATH" "$app"
          codesign --verify --strict --verbose=2 "$app"

          app_zip="$RUNNER_TEMP/yaat-crc-config-app.zip"
          ditto -c -k --keepParent "$app" "$app_zip"
          # --wait blocks until Apple finishes (usually a few minutes). If the
          # submission is rejected there is no ticket, so stapler staple fails
          # and the step errors out.
          xcrun notarytool submit "$app_zip" \
            --keychain-profile "notary-profile" --keychain "$KEYCHAIN_PATH" --wait
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"

          # ---- Build the .dmg from the stapled app, then notarize + staple it ----
          hdiutil create -volname "yaat-crc-config" -srcfolder "$staging" \
            -ov -format UDZO "$dmg"
          codesign --force --timestamp \
            --sign "$SIGN_APP_IDENTITY" --keychain "$KEYCHAIN_PATH" "$dmg"
          xcrun notarytool submit "$dmg" \
            --keychain-profile "notary-profile" --keychain "$KEYCHAIN_PATH" --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"

          mkdir -p ../../dist
          cp "$dmg" "../../dist/${{ matrix.asset_name }}"

      - name: Clean up signing keychain (macOS)
        if: ${{ always() && matrix.os == 'macos-latest' && steps.signing.outputs.enabled == 'true' }}
        run: security delete-keychain "$RUNNER_TEMP/crc-config-signing.keychain-db"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          path: artifacts

      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: yaat-crc-config ${{ github.ref_name }}
          files: release/*
          body: |
            Standalone tool that adds YAAT server entries to CRC's `DevEnvironments.json` —
            no need to install the full YAAT client.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `yaat-crc-config-windows-x86_64.exe` |
            | macOS (Intel + Apple Silicon) | `yaat-crc-config-macos-universal.dmg` |
            | Linux x86_64 | `yaat-crc-config-linux-x86_64` |

            Verify with `SHA256SUMS.txt`.

            ### What it does

            Detects your CRC config directory, then adds:
            - `YAAT1` → `https://yaat1.leftos.dev`

            Existing unrelated entries in `DevEnvironments.json` are preserved. Re-running
            the tool is safe — it updates URLs in place. If you host a YAAT server yourself,
            add its entry to `DevEnvironments.json` by hand.

            ### Running it

            - **macOS**: Open `yaat-crc-config-macos-universal.dmg` and double-click
              `yaat-crc-config.app` (or drag it to Applications). It's signed and
              notarized, so click **Open** on the first-launch prompt and it runs.
            - **Windows**: Run `yaat-crc-config-windows-x86_64.exe`. If SmartScreen
              appears, click "More info" → "Run anyway".
            - **Linux**: `chmod +x yaat-crc-config-linux-x86_64`, then run it.
