name: Discord Push Notification

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"
          REPO_URL="https://github.com/${REPO}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          COMPARE_URL="${REPO_URL}/compare/${BEFORE}...${AFTER}"

          # Collect one rendered line per commit into an array.
          LINES=()
          while IFS= read -r line; do
            SHA="${line%% *}"
            MSG="${line#* }"
            SHORT_SHA="${SHA:0:7}"
            ESCAPED_MSG=$(printf '%s' "$MSG" | sed 's/\\/\\\\/g; s/"/\\"/g')
            LINES+=("[\`${SHORT_SHA}\`](${REPO_URL}/commit/${SHA}) ${ESCAPED_MSG}")
          done < <(git log --reverse --format="%H %s" "${BEFORE}..${AFTER}" 2>/dev/null || git log --format="%H %s" -1)

          COMMIT_COUNT="${#LINES[@]}"

          # Chunk lines into batches whose description stays under Discord's
          # 4096-char embed description limit (we target 3500 for safety).
          MAX_DESC=3500
          BATCHES=()
          CURRENT=""
          for line in "${LINES[@]}"; do
            CANDIDATE="${CURRENT}${line}\\n"
            if [[ -n "$CURRENT" && ${#CANDIDATE} -gt $MAX_DESC ]]; then
              BATCHES+=("$CURRENT")
              CURRENT="${line}\\n"
            else
              CURRENT="$CANDIDATE"
            fi
          done
          if [[ -n "$CURRENT" ]]; then
            BATCHES+=("$CURRENT")
          fi

          TOTAL_PARTS=${#BATCHES[@]}
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          for i in "${!BATCHES[@]}"; do
            PART=$((i + 1))
            if [[ $TOTAL_PARTS -eq 1 ]]; then
              TITLE="${COMMIT_COUNT} new commit(s) to ${REPO_NAME}:${BRANCH}"
            else
              TITLE="${COMMIT_COUNT} new commit(s) to ${REPO_NAME}:${BRANCH} (part ${PART}/${TOTAL_PARTS})"
            fi

            DESC="${BATCHES[$i]}"
            PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${TITLE}",
              "url": "${COMPARE_URL}",
              "description": "${DESC}",
              "color": 5814783,
              "footer": { "text": "Pushed by ${ACTOR}" },
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )
            curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
          done
