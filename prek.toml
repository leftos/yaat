# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "check-merge-conflict" },
    { id = "detect-private-key", exclude = "tools/discord-bot/" },
    # 20 MB ceiling: the recording test bundles (tests/Yaat.Sim.Tests/TestData/*.zip) are
    # committed as regular Git objects (not Git LFS) and the largest snapshot-bearing
    # bundles run to ~14 MB. The ceiling still catches genuinely oversized accidental commits.
    { id = "check-added-large-files", args = ["--maxkb=20480"] },
]

[[repos]]
repo = "local"

# Replaces builtin `trailing-whitespace` + `end-of-file-fixer`: applies the same
# fixes but auto-stages the result so the commit proceeds instead of failing
# with "files were modified by this hook".
[[repos.hooks]]
id = "whitespace-fix-autostage"
name = "trim trailing whitespace + EOF newline (auto-stages fixes)"
entry = "bash tools/hooks/whitespace-fix-autostage.sh"
language = "system"
types = ["text"]
stages = ["pre-commit"]

[[repos.hooks]]
id = "dotnet-format-style"
name = "dotnet format style"
entry = "bash tools/hooks/dotnet-format-wrapper.sh style"
language = "system"
types = ["c#"]
require_serial = true
stages = ["pre-commit"]

[[repos.hooks]]
id = "dotnet-format-analyzers"
name = "dotnet format analyzers"
entry = "bash tools/hooks/dotnet-format-wrapper.sh analyzers"
language = "system"
types = ["c#"]
require_serial = true
stages = ["pre-commit"]

[[repos.hooks]]
id = "csharpier"
name = "dotnet csharpier format"
entry = "bash tools/hooks/csharpier-wrapper.sh"
language = "system"
types = ["c#"]
require_serial = true
stages = ["pre-commit"]

# Mirrors the CI guard in .github/workflows/ci.yml. The shipped HTML is opened
# by Help → Command Cheatsheet; a stale HTML would show users an out-of-date
# command list. Triggers only when the JSON, HTML, or generator script changes
# so day-to-day commits don't pay the cost.
[[repos.hooks]]
id = "cheatsheet-sync"
name = "command cheatsheet HTML in sync with JSON"
entry = "node tools/build-cheatsheet.mjs --check"
language = "system"
files = '^(docs/command-cheatsheet\.(json|html)|tools/build-cheatsheet\.mjs)$'
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "dotnet-build"
name = "dotnet build (warnings as errors)"
entry = "dotnet build -p:TreatWarningsAsErrors=true"
language = "system"
pass_filenames = false
stages = ["pre-commit"]
