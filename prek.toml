# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-merge-conflict" },
    { id = "detect-private-key", exclude = "tools/discord-bot/" },
    # 8 MB ceiling: accommodates recording bundles that include snapshots for hybrid-replay
    # tests (RecordingArchive.ReadSnapshotAt). Bundles that only need command replay can be
    # stripped to a few KB, but tests that exercise snapshot restore must keep them inline.
    { id = "check-added-large-files", args = ["--maxkb=8192"] },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "dotnet-format-style"
name = "dotnet format style"
entry = "dotnet format style"
language = "system"
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "dotnet-format-analyzers"
name = "dotnet format analyzers"
entry = "dotnet format analyzers"
language = "system"
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "csharpier"
name = "dotnet csharpier format"
entry = "bash tools/hooks/csharpier-check.sh"
language = "system"
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "dotnet-build"
name = "dotnet build (warnings as errors)"
entry = "dotnet build -p:TreatWarningsAsErrors=true"
language = "system"
pass_filenames = false
stages = ["pre-commit"]
