name = "yaat-discord-bot"
main = "src/worker.js"
compatibility_date = "2024-12-01"

[vars]
GITHUB_REPO = "leftos/yaat"
# Repo the scenario-validation workflow lives in. Workflow dispatch hits this one;
# everything else (issue creation, labels, comments) still goes to GITHUB_REPO above.
VALIDATION_REPO = "leftos/yaat-server"

# Set these via `wrangler secret put <NAME>`:
# DISCORD_PUBLIC_KEY          - from Discord app > General Information
# DISCORD_BOT_TOKEN           - from Discord app > Bot
# DISCORD_ALLOWED_USER_ID     - your Discord user ID
# GITHUB_WEBHOOK_SECRET       - secret for GitHub webhook signature verification
# GITHUB_APP_ID               - GitHub App ID (from app settings > General)
# GITHUB_APP_PRIVATE_KEY      - GitHub App private key (PEM format, generate from app settings > Private keys)
# GITHUB_APP_INSTALLATION_ID  - Installation ID for leftos/yaat (issue sync)
# VALIDATION_APP_INSTALLATION_ID (optional) - separate installation ID for leftos/yaat-server if not on the same install

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "yaat-attachments"

[[kv_namespaces]]
binding = "THREAD_ISSUES"
id = "192a2dd842c74910968cbdf1946be82a"

# Auto-sync new thread replies as issue comments every 5 minutes
[triggers]
crons = ["*/5 * * * *"]
