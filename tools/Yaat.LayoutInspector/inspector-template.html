<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout Inspector</title>
<style>
/*__CSS__*/
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"></div>
<div id="hud"></div>
<div id="hlpanel">
  <h4>Highlight</h4>
  <input id="hlinput" type="text" list="hloptions" placeholder="search node / taxiway / runway, then Enter" autocomplete="off">
  <datalist id="hloptions"></datalist>
  <div class="hint">Examples: <code>1753</code> &middot; <code>E</code> &middot; <code>28L</code>. Click chips to remove.</div>
  <div id="hlchips"></div>
  <button id="hlclear">Clear all</button>
</div>
<div id="legend">
  <span class="lc" style="background:var(--legend-twy)"></span>Taxiway
  <span class="lc ls" style="background:var(--legend-rwy)"></span>RWY CL
  <span class="lc ls" style="background:var(--legend-arc)"></span>Arc
  <span class="lc ls" style="background:var(--legend-ramp)"></span>Ramp
  <span class="lc ls" style="background:var(--legend-hs)"></span>HS
  <span class="lc ls" style="background:var(--legend-route)"></span>Route
  <br><span class="keys">scroll = zoom &nbsp;&nbsp; drag = pan &nbsp;&nbsp; hover = inspect &nbsp;&nbsp; M = measure</span>
</div>
<div id="player">
  <div class="player-row">
    <button id="playBtn">&#9654;</button>
    <input id="scrub" type="range" min="0" max="0" value="0">
    <span id="tickClock"></span>
  </div>
  <div id="tickAircraft"></div>
</div>
<script>
"use strict";
window.D = /*__DATA__*/;
</script>
<script>
/*__JS__*/
</script>
</body>
</html>
