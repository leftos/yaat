<!DOCTYPE html>
<html>
<head>
    <title>YAAT vTDLS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Suppress the browser's automatic favicon.ico probe; we don't ship
         one, and the server's StaticFileMiddleware would 404 it noisily. -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./app.css" />
</head>
<body style="margin: 0; overflow: hidden; background: #FFFFFF;">
    <div id="out">
        <div class="splash">Loading YAAT vTDLS...</div>
    </div>
    <script type="module">
        // Sign-in gate. Order: (1) ensure a VATSIM session via the same-origin
        // session cookie (/auth/token), (2) ensure operating initials + ARTCC are
        // present (VATSIM doesn't supply them — auto-filled + editable), then (3)
        // boot the WASM bundle. Avoids paying the ~5 s WASM boot just to show a form.
        const APP_PATH = '/vtdls/';
        const STORAGE_KEY = 'yaat-vtdls-identity';
        const params = new URLSearchParams(window.location.search);

        // Refreshes the session cookie and returns the identity, or null if not signed in.
        const session = await fetch('/auth/token', { credentials: 'same-origin' })
            .then(r => (r.ok ? r.json() : null))
            .catch(() => null);

        if (!session) {
            renderSignIn();
        } else if (params.get('initials') && params.get('artcc')) {
            await import('./main.js');
        } else {
            renderIdentityForm(session);
        }

        function renderSignIn() {
            const out = clearOut();
            const form = el('div', { className: 'landing-form' });
            form.appendChild(el('h1', { textContent: 'YAAT vTDLS' }));
            form.appendChild(el('p', { className: 'subtitle', textContent: 'Sign in with your VATSIM account to continue.' }));
            if (params.get('auth_error')) {
                form.appendChild(el('p', { className: 'note', textContent: 'Sign-in did not complete. Please try again.' }));
            }
            const button = el('button', { type: 'button', textContent: 'Sign in with VATSIM' });
            button.addEventListener('click', () => {
                const ret = APP_PATH + roomServerQuery();
                window.location.href = '/auth/vatsim/start?return=' + encodeURIComponent(ret);
            });
            form.appendChild(button);
            out.appendChild(form);
        }

        function renderIdentityForm(session) {
            let stored = {};
            try {
                stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {};
            } catch {
                stored = {};
            }

            const initialInitials = params.get('initials') || stored.initials || deriveInitials(session.name);
            const initialArtcc = params.get('artcc') || stored.artcc || session.subdivision || '';

            const out = clearOut();
            const form = el('form', { id: 'connect-form', className: 'landing-form', autocomplete: 'on' });
            form.appendChild(el('h1', { textContent: 'YAAT vTDLS' }));
            const who = session.name ? `${session.name} (${session.cid}) — ${session.rating}` : `CID ${session.cid} — ${session.rating}`;
            form.appendChild(el('p', { className: 'subtitle', textContent: `Signed in as ${who}` }));

            form.appendChild(field('Initials', input({
                name: 'initials', type: 'text', maxLength: 3, pattern: '[A-Za-z]{1,3}',
                required: true, autofocus: true, value: initialInitials,
                style: 'text-transform:uppercase',
            })));
            form.appendChild(field('ARTCC', input({
                name: 'artcc', type: 'text', maxLength: 4, pattern: '[A-Za-z0-9]{2,4}',
                required: true, value: initialArtcc,
                style: 'text-transform:uppercase',
            })));

            const submit = el('button', { type: 'submit', textContent: 'Continue' });
            form.appendChild(submit);
            form.appendChild(el('p', { className: 'note', textContent: 'Initials and ARTCC are saved in your browser for next time.' }));
            form.addEventListener('submit', onSubmit);
            out.appendChild(form);

            function onSubmit(e) {
                e.preventDefault();
                const data = new FormData(form);
                const values = {
                    initials: (data.get('initials') || '').trim().toUpperCase(),
                    artcc: (data.get('artcc') || '').trim().toUpperCase(),
                };
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(values));
                } catch {
                    // Storage may be disabled — proceed; the URL still carries the values.
                }
                const next = new URLSearchParams();
                next.set('initials', values.initials);
                next.set('artcc', values.artcc);
                if (params.get('room')) next.set('room', params.get('room'));
                if (params.get('server')) next.set('server', params.get('server'));
                window.location.search = '?' + next.toString();
            }
        }

        // Preserves room/server params across the VATSIM redirect.
        function roomServerQuery() {
            const keep = new URLSearchParams();
            if (params.get('room')) keep.set('room', params.get('room'));
            if (params.get('server')) keep.set('server', params.get('server'));
            const s = keep.toString();
            return s ? '?' + s : '';
        }

        function deriveInitials(name) {
            if (!name) return '';
            const parts = name.trim().split(/\s+/);
            if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
            return parts[0].slice(0, 2).toUpperCase();
        }

        function clearOut() {
            const out = document.getElementById('out');
            out.textContent = '';
            return out;
        }

        function el(tag, props = {}) {
            const node = document.createElement(tag);
            for (const [k, v] of Object.entries(props)) {
                if (v === undefined || v === null) continue;
                if (k === 'textContent') {
                    node.textContent = v;
                } else if (k === 'className') {
                    node.className = v;
                } else if (k === 'style' && typeof v === 'string') {
                    node.setAttribute('style', v);
                } else if (k in node) {
                    node[k] = v;
                } else {
                    node.setAttribute(k, v);
                }
            }
            return node;
        }

        function input(props) {
            const node = el('input', props);
            if ('value' in props && props.value !== undefined) {
                node.value = props.value;
            }
            return node;
        }

        function field(labelText, control) {
            const label = el('label', { textContent: labelText });
            label.appendChild(control);
            return label;
        }
    </script>
</body>
</html>
